version: "3.9"

services:
  phishguard:
    build: .
    container_name: phishguard
    ports:
      - "8501:8501"
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - API_PROXY_PORT=8080
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - phishguard-net

  api-proxy:
    build: .
    container_name: phishguard-api
    command: python api_proxy.py --port 8080
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - API_PROXY_PORT=8080
      - TZ=UTC
    restart: unless-stopped
    depends_on:
      - phishguard
    networks:
      - phishguard-net

networks:
  phishguard-net:
    driver: bridge
