services:
  streamlit:
    build: .
    container_name: phishguard-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./api_gateway/api_keys.json:/app/api_keys.json:ro
    env_file:
      - .env
    restart: unless-stopped

  api-gateway:
    build: .
    container_name: phishguard-api
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./api_gateway/api_keys.json:/app/api_keys.json:ro
    env_file:
      - .env
    restart: unless-stopped

  webhook:
    build: .
    container_name: phishguard-webhook
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PORT=5000
    command: python webhook.py
    restart: unless-stopped

  imap-worker:
    build: .
    container_name: phishguard-imap
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASS=${IMAP_PASS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    command: python workers/imap_worker.py
    restart: unless-stopped
    profiles:
      - imap
