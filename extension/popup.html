<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 360px;
            background: #0a0e1a;
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, sans-serif;
            padding: 0;
        }
        .header {
            background: linear-gradient(135deg, #0f172a, #0a0e1a);
            border-bottom: 1px solid #1e3a5f;
            padding: 20px 20px 16px;
            text-align: center;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: #60a5fa;
            letter-spacing: -0.02em;
        }
        .logo span { color: #3b82f6; }
        .subtitle {
            font-size: 0.7rem;
            color: #475569;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .content { padding: 16px 20px; }
        .status-card {
            background: #111827;
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 16px;
        }
        .status-card.safe { border-color: #44aa4488; }
        .status-card.warning { border-color: #ff880088; }
        .status-card.danger { border-color: #ff444488; }
        .status-icon { font-size: 2rem; margin-bottom: 8px; }
        .status-text { font-weight: 700; font-size: 1rem; }
        .status-detail { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(37,99,235,0.3);
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(37,99,235,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary {
            background: transparent;
            border: 1px solid #1e3a5f;
            color: #94a3b8;
            box-shadow: none;
            margin-top: 8px;
        }
        .btn-secondary:hover { border-color: #3b82f6; color: #e2e8f0; box-shadow: none; }
        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 16px 0;
        }
        .metric {
            background: #111827;
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
        }
        .metric-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: #60a5fa;
        }
        .metric-value.danger { color: #ff4444; }
        .metric-value.warning { color: #ffaa00; }
        .metric-label {
            font-size: 0.6rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 4px;
        }
        .result-details {
            background: #111827;
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            padding: 14px;
            margin-top: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .result-details::-webkit-scrollbar { width: 4px; }
        .result-details::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }
        .detail-item {
            font-size: 0.75rem;
            color: #94a3b8;
            padding: 4px 0;
            border-bottom: 1px solid #1e3a5f44;
        }
        .detail-item:last-child { border-bottom: none; }
        .detail-item strong { color: #e2e8f0; }
        .tag {
            display: inline-block;
            background: #1e3a5f;
            color: #60a5fa;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.65rem;
            margin: 2px;
        }
        .footer {
            padding: 12px 20px;
            border-top: 1px solid #1e3a5f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer a {
            color: #3b82f6;
            font-size: 0.7rem;
            text-decoration: none;
        }
        .footer a:hover { text-decoration: underline; }
        .footer-version {
            color: #334155;
            font-size: 0.65rem;
        }
        .error-box {
            background: #2a0a0a;
            border: 1px solid #ff444444;
            border-radius: 8px;
            padding: 12px;
            color: #ff8888;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #1e3a5f;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🛡 PhishGuard <span>AI</span></div>
        <div class="subtitle">Real-time Phishing Protection</div>
    </div>

    <div class="content">
        <div class="status-card" id="statusCard">
            <div class="status-icon" id="statusIcon">🛡</div>
            <div class="status-text" id="statusText">Ready</div>
            <div class="status-detail" id="statusDetail">Scan the current page for threats</div>
        </div>

        <button class="btn" id="scanBtn">🔍 Scan This Page</button>

        <div id="metricsContainer" style="display:none">
            <div class="metrics">
                <div class="metric">
                    <div class="metric-value" id="metricScore">—</div>
                    <div class="metric-label">Risk Score</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="metricUrls">—</div>
                    <div class="metric-label">URLs Found</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="metricKeywords">—</div>
                    <div class="metric-label">Keywords</div>
                </div>
            </div>
        </div>

        <div id="detailsContainer"></div>
        <div id="errorContainer"></div>
    </div>

    <div class="footer">
        <a href="https://phishguard-okmkdupa4om23rq6e78bad.streamlit.app" target="_blank">Open Dashboard →</a>
        <span class="footer-version">v2.0.0</span>
    </div>

    <script src="popup.js"></script>
</body>
</html>
