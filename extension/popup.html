<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 300px;
            background: #0a0e1a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
        }
        .logo {
            font-size: 1.1rem;
            font-weight: 800;
            color: #60a5fa;
            margin-bottom: 4px;
        }
        .subtitle {
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
        .status {
            background: #111827;
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            color: #94a3b8;
            text-align: center;
        }
        .btn {
            display: block;
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-bottom: 8px;
        }
        .btn:hover { background: #1d4ed8; }
        .btn-outline {
            background: transparent;
            border: 1px solid #2563eb;
            color: #60a5fa;
        }
        .btn-outline:hover { background: #1e3a5f; }
        .tip {
            font-size: 0.75rem;
            color: #475569;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="logo">🛡️ PhishGuard AI</div>
    <div class="subtitle">AI-Powered Phishing Detection</div>

    <div class="status">
        Open any email in Gmail and click<br>
        <strong style="color:#60a5fa">🛡️ Scan Email</strong>
        to analyze it instantly
    </div>

    <a href="https://phishguard-okmkdupa4om23rq6e78bad.streamlit.app"
        target="_blank" class="btn">
        Open Full App →
    </a>

    <a href="https://micheal-dev-cyber.github.io/phishguard"
        target="_blank" class="btn btn-outline">
        Visit Website
    </a>

    <div class="tip">
        PhishGuard AI v1.0 — Free Edition
    </div>

    <script src="popup.js"></script>
</body>
</html>
