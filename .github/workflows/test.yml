name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ app.py webhook.py --ignore=E402,E501,F401,F811

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - name: Run tests with diagnostics
        run: |
          python -m pytest tests/ -v --tb=short -x 2>&1 | tee /tmp/pytest_output.txt; rc=${PIPESTATUS[0]}
          grep -E 'FAILED|ERRORS|error:|PASSED|test session|short test summary' /tmp/pytest_output.txt | head -20 | while IFS= read -r line; do echo "::error file=test.yml::$line"; done
          exit $rc
      - run: python -c "import py_compile, glob; [py_compile.compile(f, doraise=True) for f in glob.glob('*.py') + glob.glob('src/*.py')]"
