name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ app.py webhook.py --ignore=E402,E501,F401,F811

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - name: Run tests (always succeeds)
        id: tests
        run: |
          python -m pytest tests/ -v --tb=short -x 2>&1 | tee /tmp/pytest_output.txt; echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      - name: Show error details (visible via annotations)
        if: always()
        run: |
          echo "=== FIRST 15 LINES ==="
          head -15 /tmp/pytest_output.txt 2>/dev/null || echo "(no output file)"
          echo "=== FAILURES ==="
          grep -nE 'FAILED|ERROR|Error|assert|raise|short test summary' /tmp/pytest_output.txt 2>/dev/null || echo "(no failures found in output)"
          echo "=== LAST 30 LINES ==="
          tail -30 /tmp/pytest_output.txt 2>/dev/null
          echo "=== ANNOTATIONS ==="
          grep -E 'FAILED|ERROR|short test summary' /tmp/pytest_output.txt 2>/dev/null | head -10 | while IFS= read -r line; do echo "::error::$line"; done
      - name: Fail if tests failed
        if: always()
        run: |
          echo "Test exit code: ${{ steps.tests.outputs.exit_code }}"
          if [ "${{ steps.tests.outputs.exit_code }}" != "0" ]; then exit 1; fi
