name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ app.py webhook.py --ignore=E402,E501,F401,F811

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - name: Run tests (capture exit code)
        id: tests
        run: |
          python -m pytest tests/ -v --tb=short -x 2>&1 | tee /tmp/pytest_output.txt; echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      - name: Show test results
        if: always()
        run: |
          echo "=== LAST 30 LINES ==="
          tail -30 /tmp/pytest_output.txt 2>/dev/null || echo "(no output file)"
          echo "=== Test exit code: ${{ steps.tests.outputs.exit_code }} ==="
          if [ "${{ steps.tests.outputs.exit_code }}" != "0" ]; then exit 1; fi
